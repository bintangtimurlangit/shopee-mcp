name: Feature request
description: Suggest a new tool or an improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: Describe the use case. What discovery/exploration task would this enable?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: A new tool? A new argument? A different output? If it maps to a Shopee page/feature, describe it.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This fits the project's scope — **public** product discovery (no seller or account actions)
