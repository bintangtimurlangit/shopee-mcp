name: Bug report
description: A tool returns an error, wrong data, or stops working
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. This MCP reads Shopee through a **logged-in browser session**, so a tool can break when Shopee changes its site or anti-bot behavior. Details help a lot.
  - type: dropdown
    id: tool
    attributes:
      label: Which tool?
      options:
        - search_products
        - get_product_detail
        - Login / session
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you call, what did you expect, and what did you get? Paste the tool's response text (redact anything private).
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: 'e.g. 0.1.0'
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: 'e.g. 20.11.0 (node -v)'
  - type: dropdown
    id: display
    attributes:
      label: Display
      options:
        - Real display (desktop / WSLg)
        - Headless server via xvfb-run
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I ran `npm run login` and confirmed I'm signed in
        - label: I ran with `DEBUG=true` and included any relevant output
        - label: I searched existing issues for a duplicate
