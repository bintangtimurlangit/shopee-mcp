name: Release

# Publishes to npm when a version tag is pushed, e.g.:
#   git tag v0.1.1 && git push origin v0.1.1
#
# Uses npm **Trusted Publishing (OIDC)** — NO token, nothing to rotate, nothing
# expires. One-time setup: on npmjs.com, open the package →
# Settings → "Trusted Publisher" → add this GitHub repo + `release.yml`.
# Until that is configured, the publish step will fail; the build still runs.

on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub release
  id-token: write # npm Trusted Publishing (OIDC) + provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Verify tag matches package version
        run: test "${GITHUB_REF_NAME#v}" = "$(node -p "require('./package.json').version")"
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run build

      - name: Publish to npm (OIDC Trusted Publishing — tokenless)
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "::notice::$NAME@$VERSION is already published — skipping publish."
          else
            npm publish
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
