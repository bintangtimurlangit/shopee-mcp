name: Release

# Publishes to npm when a version tag is pushed, e.g.:
#   git tag v0.1.1 && git push origin v0.1.1
#
# Requires an npm automation token stored as the repo secret `NPM_TOKEN`.
# If the secret is absent the publish step is skipped (build/typecheck still run).

on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub release
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

      - name: Publish to npm
        if: ${{ env.NPM_TOKEN != '' }}
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "::notice::$NAME@$VERSION is already published — skipping publish."
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip publish (no NPM_TOKEN)
        if: ${{ env.NPM_TOKEN == '' }}
        run: echo "::warning::NPM_TOKEN secret not set — skipping npm publish. Build and typecheck passed."
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
